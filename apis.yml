aid: microsoft-onedrive
url: https://raw.githubusercontent.com/api-evangelist/microsoft-onedrive/refs/heads/main/apis.yml
apis:
  - aid: microsoft-onedrive:graph-drive-api
    name: Microsoft Graph OneDrive API
    tags:
      - File Storage
      - Cloud Storage
      - Microsoft Graph
      - Files
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0/
    humanURL: https://learn.microsoft.com/en-us/onedrive/developer/rest-api/
    properties:
      - url: https://learn.microsoft.com/en-us/onedrive/developer/rest-api/
        type: Documentation
      - url: https://learn.microsoft.com/en-us/graph/api/resources/onedrive
        type: API Reference
    description: >-
      The Microsoft Graph OneDrive API provides programmatic access to
      OneDrive personal and OneDrive for Business file storage. Developers
      can upload, download, search, and share files and folders, manage
      permissions, track changes with delta queries, and create sharing
      links. The API supports large file uploads with resumable sessions
      and real-time notifications via webhooks.
  - aid: microsoft-onedrive:file-picker
    name: OneDrive File Picker
    tags:
      - File Picker
      - UI Component
      - Files
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://learn.microsoft.com/en-us/onedrive/developer/controls/file-pickers/
    properties:
      - url: https://learn.microsoft.com/en-us/onedrive/developer/controls/file-pickers/
        type: Documentation
    description: >-
      The OneDrive File Picker is a JavaScript SDK that provides a
      pre-built UI component for selecting files from OneDrive within
      web applications. It handles authentication, file browsing, and
      selection, returning file metadata and download URLs to the
      calling application without requiring direct API integration.
